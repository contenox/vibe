components:
    schemas:
        ErrorResponse:
            properties:
                error:
                    properties:
                        code:
                            description: A specific error code identifier (e.g., 'invalid_parameter_value', 'unauthorized')
                            type: string
                        message:
                            description: A human-readable error message
                            type: string
                        param:
                            description: The parameter that caused the error, if applicable
                            nullable: true
                            type: string
                        type:
                            description: The error type category (e.g., 'invalid_request_error', 'authentication_error')
                            type: string
                    required:
                        - message
                        - type
                        - code
                    type: object
            required:
                - error
            type: object
        apiframework_AboutServer:
            properties:
                nodeInstanceID:
                    type: string
                tenancy:
                    type: string
                version:
                    type: string
            required:
                - version
                - nodeInstanceID
                - tenancy
            type: object
        apiframework_MessageResponse:
            properties:
                message:
                    type: string
            required:
                - message
            type: object
        array_backendapi_ObservedModel:
            items:
                $ref: '#/components/schemas/backendapi_ObservedModel'
            type: array
        array_backendapi_backendSummary:
            items:
                $ref: '#/components/schemas/backendapi_backendSummary'
            type: array
        array_hookproviderservice_LocalHook:
            items:
                $ref: '#/components/schemas/hookproviderservice_LocalHook'
            type: array
        array_internalchatapi_chatMessage:
            items:
                $ref: '#/components/schemas/internalchatapi_chatMessage'
            type: array
        array_internalchatapi_chatSession:
            items:
                $ref: '#/components/schemas/internalchatapi_chatSession'
            type: array
        array_planstore_Plan:
            items:
                $ref: '#/components/schemas/planstore_Plan'
            type: array
        array_runtimestate_ProviderConfig:
            items:
                $ref: '#/components/schemas/runtimestate_ProviderConfig'
            type: array
        array_runtimetypes_AffinityGroup:
            items:
                $ref: '#/components/schemas/runtimetypes_AffinityGroup'
            type: array
        array_runtimetypes_Backend:
            items:
                $ref: '#/components/schemas/runtimetypes_Backend'
            type: array
        array_runtimetypes_MCPServer:
            items:
                $ref: '#/components/schemas/runtimetypes_MCPServer'
            type: array
        array_runtimetypes_Model:
            items:
                $ref: '#/components/schemas/runtimetypes_Model'
            type: array
        array_runtimetypes_RemoteHook:
            items:
                $ref: '#/components/schemas/runtimetypes_RemoteHook'
            type: array
        array_statetype_BackendRuntimeState:
            items:
                $ref: '#/components/schemas/statetype_BackendRuntimeState'
            type: array
        array_string:
            items:
                type: string
            type: array
        array_terminalstore_Session:
            items:
                $ref: '#/components/schemas/terminalstore_Session'
            type: array
        array_vfsapi_FileResponse:
            items:
                $ref: '#/components/schemas/vfsapi_FileResponse'
            type: array
        backendapi_ObservedModel:
            properties:
                canChat:
                    example: true
                    type: boolean
                canEmbed:
                    example: false
                    type: boolean
                canPrompt:
                    example: true
                    type: boolean
                canStream:
                    example: true
                    type: boolean
                contextLength:
                    example: 8192
                    type: integer
                id:
                    example: mistral:instruct
                    type: string
                model:
                    example: mistral:instruct
                    type: string
            required:
                - id
                - model
                - contextLength
                - canChat
                - canEmbed
                - canPrompt
                - canStream
            type: object
        backendapi_OpenAICompatibleModelList:
            properties:
                data:
                    items:
                        $ref: '#/components/schemas/backendapi_OpenAIModel'
                    type: array
                object:
                    example: list
                    type: string
            required:
                - object
                - data
            type: object
        backendapi_OpenAIModel:
            properties:
                created:
                    example: 1717020800
                    type: integer
                id:
                    example: mistral:latest
                    type: string
                object:
                    example: mistral:latest
                    type: string
                owned_by:
                    example: system
                    type: string
            required:
                - id
                - object
                - created
                - owned_by
            type: object
        backendapi_backendDetails:
            properties:
                baseUrl:
                    example: http://ollama-prod.internal:11434
                    type: string
                createdAt:
                    example: "2023-11-15T14:30:45Z"
                    format: date-time
                    type: string
                error:
                    example: 'connection timeout: context deadline exceeded'
                    type: string
                id:
                    example: b7d9e1a3-8f0c-4a7d-9b1e-2f3a4b5c6d7e
                    type: string
                models:
                    items:
                        type: string
                    type: array
                name:
                    example: ollama-production
                    type: string
                pulledModels:
                    $ref: '#/components/schemas/statetype_ModelPullStatus'
                type:
                    example: ollama
                    type: string
                updatedAt:
                    example: "2023-11-15T14:30:45Z"
                    format: date-time
                    type: string
            required:
                - id
                - name
                - baseUrl
                - type
                - models
                - pulledModels
                - createdAt
                - updatedAt
            type: object
        backendapi_backendSummary:
            properties:
                baseUrl:
                    example: http://localhost:11434
                    type: string
                createdAt:
                    example: "2023-01-01T00:00:00Z"
                    format: date-time
                    type: string
                error:
                    example: error-message
                    type: string
                id:
                    example: backend-id
                    type: string
                models:
                    items:
                        type: string
                    type: array
                name:
                    example: backend-name
                    type: string
                pulledModels:
                    $ref: '#/components/schemas/statetype_ModelPullStatus'
                type:
                    example: ollama
                    type: string
                updatedAt:
                    example: "2023-01-01T00:00:00Z"
                    format: date-time
                    type: string
            required:
                - id
                - name
                - baseUrl
                - type
                - models
                - pulledModels
                - createdAt
                - updatedAt
            type: object
        chatapi_OpenAIChatResponse:
            properties:
                choices:
                    $ref: '#/components/schemas/taskengine_OpenAIChatResponseChoice'
                created:
                    example: 1690000000
                    type: integer
                id:
                    example: chat_123
                    type: string
                model:
                    example: mistral:instruct
                    type: string
                object:
                    example: chat.completion
                    type: string
                stackTrace:
                    items:
                        $ref: '#/components/schemas/taskengine_CapturedStateUnit'
                    type: array
                system_fingerprint:
                    example: system_456
                    type: string
                usage:
                    $ref: '#/components/schemas/taskengine_OpenAITokenUsage'
            required:
                - id
                - object
                - created
                - model
                - choices
                - usage
            type: object
        execapi_DefaultModelResponse:
            properties:
                modelName:
                    example: mistral:latest
                    type: string
            required:
                - modelName
            type: object
        execapi_EmbedRequest:
            properties:
                text:
                    example: Hello, world!
                    type: string
            required:
                - text
            type: object
        execapi_EmbedResponse:
            properties:
                vector:
                    items:
                        type: number
                    type: array
            required:
                - vector
            type: object
        execapi_taskExecutionRequest:
            properties:
                chain:
                    $ref: '#/components/schemas/taskengine_TaskChainDefinition'
                input:
                    type: object
                inputType:
                    example: string
                    type: string
                templateVars:
                    additionalProperties: true
                    description: optional; merged with request_id for {{var:...}} macro expansion
                    type: object
            required:
                - input
                - inputType
                - chain
            type: object
        execapi_taskExecutionResponse:
            properties:
                output:
                    type: object
                outputType:
                    example: string
                    type: string
                state:
                    $ref: '#/components/schemas/taskengine_CapturedStateUnit'
            required:
                - output
                - outputType
                - state
            type: object
        execservice_SimpleExecutionResponse:
            properties:
                id:
                    example: 123e4567-e89b-12d3-a456-426614174000
                    type: string
                response:
                    example: I'm doing well, thank you!
                    type: string
            required:
                - id
                - response
            type: object
        execservice_TaskRequest:
            properties:
                model_name:
                    example: gpt-3.5-turbo
                    type: string
                model_provider:
                    example: openai
                    type: string
                prompt:
                    example: Hello, how are you?
                    type: string
            required:
                - prompt
                - model_name
                - model_provider
            type: object
        hookproviderservice_LocalHook:
            properties:
                description:
                    type: string
                name:
                    type: string
                source:
                    description: Source is builtin (in-process), mcp (persisted MCP server), or remote (HTTP hook in DB).
                    type: string
                tools:
                    items:
                        $ref: '#/components/schemas/taskengine_Tool'
                    type: array
                type:
                    type: string
                unavailableReason:
                    description: UnavailableReason is set when tools could not be loaded (e.g. unreachable MCP); other hooks still list.
                    type: string
            required:
                - name
                - description
                - type
            type: object
        internalchatapi_chatContextPayload:
            properties:
                artifacts:
                    items:
                        $ref: '#/components/schemas/internalchatapi_contextArtifact'
                    type: array
            type: object
        internalchatapi_chatMessage:
            properties:
                content:
                    type: string
                id:
                    type: string
                isLatest:
                    type: boolean
                isUser:
                    type: boolean
                role:
                    type: string
                sentAt:
                    format: date-time
                    type: string
            required:
                - id
                - role
                - content
                - sentAt
                - isUser
                - isLatest
            type: object
        internalchatapi_chatRequest:
            properties:
                context:
                    $ref: '#/components/schemas/internalchatapi_chatContextPayload'
                message:
                    type: string
                mode:
                    description: |-
                        Mode selects default task chain when chainId query is omitted: chat, prompt, plan, build.
                        build compiles the active plan and runs the compiled chain; chainId must be the executor chain ref; message may be empty.
                    type: string
            required:
                - message
            type: object
        internalchatapi_chatResponse:
            properties:
                error:
                    type: string
                inputTokenCount:
                    type: integer
                outputTokenCount:
                    type: integer
                response:
                    type: string
                state:
                    items:
                        $ref: '#/components/schemas/taskengine_CapturedStateUnit'
                    type: array
            required:
                - response
                - state
                - inputTokenCount
                - outputTokenCount
            type: object
        internalchatapi_chatSession:
            properties:
                id:
                    type: string
                lastMessage:
                    $ref: '#/components/schemas/internalchatapi_chatMessage'
                model:
                    type: string
                startedAt:
                    format: date-time
                    type: string
            required:
                - id
                - startedAt
                - model
            type: object
        internalchatapi_contextArtifact:
            properties:
                kind:
                    type: string
                payload:
                    description: JSON-encoded string
                    format: json
                    type: string
            required:
                - kind
            type: object
        internalchatapi_newChatInstanceRequest:
            properties:
                model:
                    type: string
            required:
                - model
            type: object
        middleware_LoginResponse:
            properties:
                expires_at:
                    format: date-time
                    type: string
                token:
                    type: string
                user_id:
                    type: string
                username:
                    type: string
            required:
                - token
                - expires_at
                - user_id
                - username
            type: object
        planapi_activeResponse:
            properties:
                plan:
                    $ref: '#/components/schemas/planstore_Plan'
                steps:
                    items:
                        $ref: '#/components/schemas/planstore_PlanStep'
                    type: array
            required:
                - plan
                - steps
            type: object
        planapi_cleanResponse:
            properties:
                removed:
                    type: integer
            required:
                - removed
            type: object
        planapi_compileRequest:
            properties:
                chain_id:
                    type: string
                executor_chain_id:
                    type: string
                markdown:
                    type: string
                summarizer_chain_id:
                    type: string
                write_path:
                    type: string
            required:
                - markdown
                - executor_chain_id
                - summarizer_chain_id
                - chain_id
            type: object
        planapi_compileResponse:
            properties:
                chain:
                    $ref: '#/components/schemas/taskengine_TaskChainDefinition'
                goal:
                    type: string
                path:
                    type: string
                steps:
                    items:
                        type: string
                    type: array
            required:
                - goal
                - steps
                - chain
            type: object
        planapi_markdownResponse:
            properties:
                markdown:
                    type: string
            required:
                - markdown
            type: object
        planapi_newPlanRequest:
            properties:
                goal:
                    type: string
                planner_chain_id:
                    type: string
            required:
                - goal
                - planner_chain_id
            type: object
        planapi_newPlanResponse:
            properties:
                markdown:
                    type: string
                plan:
                    $ref: '#/components/schemas/planstore_Plan'
                steps:
                    items:
                        $ref: '#/components/schemas/planstore_PlanStep'
                    type: array
            required:
                - plan
                - steps
                - markdown
            type: object
        planapi_nextStepRequest:
            properties:
                executor_chain_id:
                    type: string
                summarizer_chain_id:
                    type: string
                with_auto:
                    type: boolean
                with_shell:
                    type: boolean
            required:
                - executor_chain_id
                - summarizer_chain_id
                - with_shell
                - with_auto
            type: object
        planapi_nextStepResponse:
            properties:
                markdown:
                    type: string
                result:
                    type: string
            required:
                - result
                - markdown
            type: object
        planapi_replanRequest:
            properties:
                planner_chain_id:
                    type: string
            required:
                - planner_chain_id
            type: object
        planapi_replanResponse:
            properties:
                markdown:
                    type: string
                steps:
                    items:
                        $ref: '#/components/schemas/planstore_PlanStep'
                    type: array
            required:
                - steps
                - markdown
            type: object
        planapi_runCompiledRequest:
            properties:
                chain_id:
                    type: string
                executor_chain_id:
                    type: string
                summarizer_chain_id:
                    type: string
                write_path:
                    type: string
            required:
                - executor_chain_id
                - summarizer_chain_id
                - chain_id
            type: object
        planapi_runCompiledResponse:
            properties:
                chain:
                    $ref: '#/components/schemas/taskengine_TaskChainDefinition'
                goal:
                    type: string
                output:
                    type: object
                output_type:
                    type: string
                path:
                    type: string
                state:
                    items:
                        $ref: '#/components/schemas/taskengine_CapturedStateUnit'
                    type: array
                steps:
                    items:
                        type: string
                    type: array
            required:
                - goal
                - steps
                - output
                - output_type
                - state
            type: object
        planstore_Plan:
            properties:
                compile_executor_chain_id:
                    description: CompileExecutorChainID is the executor chain ID used when compiling (for invalidation).
                    type: string
                compiled_chain_id:
                    description: CompiledChainID is the TaskChainDefinition.ID used when compiling (for invalidation).
                    type: string
                compiled_chain_json:
                    description: CompiledChainJSON is the full [plancompile.Compile] output JSON for incremental Next (optional).
                    type: string
                created_at:
                    format: date-time
                    type: string
                goal:
                    type: string
                id:
                    type: string
                name:
                    type: string
                session_id:
                    type: string
                status:
                    $ref: '#/components/schemas/planstore_PlanStatus'
                updated_at:
                    format: date-time
                    type: string
            required:
                - id
                - name
                - goal
                - status
                - session_id
                - created_at
                - updated_at
            type: object
        planstore_PlanStatus:
            type: string
        planstore_PlanStep:
            properties:
                chat_history_json:
                    description: |-
                        ChatHistoryJSON is the raw taskengine.ChatHistory from the executor subgraph,
                        preserved for debugging and for Retry prior-attempt context.
                    type: string
                description:
                    type: string
                executed_at:
                    description: Zero time if not executed
                    format: date-time
                    type: string
                execution_result:
                    type: string
                id:
                    type: string
                last_failure_summary:
                    description: |-
                        LastFailureSummary is the Summary (or ExecutionResult fallback) from the
                        previous failed attempt of this step, moved here by Retry. Lets the next
                        attempt's summarizer see why the prior try failed.
                    type: string
                ordinal:
                    type: integer
                plan_id:
                    type: string
                status:
                    $ref: '#/components/schemas/planstore_StepStatus'
                summary:
                    description: |-
                        Summary is a JSON document (schema: outcome/summary/artifacts/handover_for_next/caveats)
                        produced by the summarizer chain and persisted by the plan_summary persist hook.
                        Empty string means NULL (legacy row or summarizer fell through to fallback).
                    type: string
                summary_error:
                    description: |-
                        SummaryError is the raw summarizer output + parse/validation error when
                        both the first summarizer attempt and its repair attempt failed validation.
                        Populated only on fallback-path persistence.
                    type: string
            required:
                - id
                - plan_id
                - ordinal
                - description
                - status
                - execution_result
                - executed_at
            type: object
        planstore_StepStatus:
            type: string
        runtimestate_ProviderConfig:
            properties:
                APIKey:
                    type: string
                Type:
                    type: string
            required:
                - APIKey
                - Type
            type: object
        runtimetypes_AffinityGroup:
            properties:
                createdAt:
                    example: "2023-11-15T14:30:45Z"
                    format: date-time
                    type: string
                id:
                    example: p9a8b7c6-d5e4-f3a2-b1c0-d9e8f7a6b5c4
                    type: string
                name:
                    example: production-chat
                    type: string
                purposeType:
                    example: Internal Tasks
                    type: string
                updatedAt:
                    example: "2023-11-15T14:30:45Z"
                    format: date-time
                    type: string
            required:
                - id
                - name
                - purposeType
                - createdAt
                - updatedAt
            type: object
        runtimetypes_Backend:
            properties:
                baseUrl:
                    example: http://ollama-prod.internal:11434
                    type: string
                createdAt:
                    example: "2023-11-15T14:30:45Z"
                    format: date-time
                    type: string
                id:
                    example: b7d9e1a3-8f0c-4a7d-9b1e-2f3a4b5c6d7e
                    type: string
                name:
                    example: ollama-production
                    type: string
                type:
                    example: ollama
                    type: string
                updatedAt:
                    example: "2023-11-15T14:30:45Z"
                    format: date-time
                    type: string
            required:
                - id
                - name
                - baseUrl
                - type
                - createdAt
                - updatedAt
            type: object
        runtimetypes_InjectionArg:
            properties:
                in:
                    example: body
                    type: string
                name:
                    example: access_token
                    type: string
                value:
                    type: object
            required:
                - name
                - value
                - in
            type: object
        runtimetypes_MCPServer:
            properties:
                args:
                    type: string
                authEnvKey:
                    description: env var name
                    example: MCP_FS_TOKEN
                    type: string
                authToken:
                    description: literal token (avoid in prod)
                    type: string
                authType:
                    description: '"" | "bearer" | "oauth"'
                    example: bearer
                    type: string
                command:
                    example: npx
                    type: string
                connectTimeoutSeconds:
                    example: 30
                    type: integer
                createdAt:
                    example: "2024-01-15T10:00:00Z"
                    format: date-time
                    type: string
                headers:
                    additionalProperties: true
                    description: additional HTTP headers for SSE/HTTP transports
                    type: object
                id:
                    example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    type: string
                injectParams:
                    additionalProperties: true
                    description: injected as tool call args, hidden from model schema
                    type: object
                name:
                    example: filesystem
                    type: string
                transport:
                    description: sse | http | stdio
                    example: sse
                    type: string
                updatedAt:
                    example: "2024-01-15T10:00:00Z"
                    format: date-time
                    type: string
                url:
                    example: http://mcp-fs:8080/sse
                    type: string
            required:
                - id
                - name
                - transport
                - connectTimeoutSeconds
                - createdAt
                - updatedAt
            type: object
        runtimetypes_Model:
            properties:
                canChat:
                    example: true
                    type: boolean
                canEmbed:
                    example: false
                    type: boolean
                canPrompt:
                    example: true
                    type: boolean
                canStream:
                    example: true
                    type: boolean
                contextLength:
                    example: 8192
                    type: integer
                createdAt:
                    example: "2023-11-15T14:30:45Z"
                    format: date-time
                    type: string
                id:
                    example: m7d8e9f0a-1b2c-3d4e-5f6a-7b8c9d0e1f2a
                    type: string
                model:
                    example: mistral:instruct
                    type: string
                updatedAt:
                    example: "2023-11-15T14:30:45Z"
                    format: date-time
                    type: string
            required:
                - id
                - model
                - contextLength
                - canChat
                - canEmbed
                - canPrompt
                - canStream
                - createdAt
                - updatedAt
            type: object
        runtimetypes_RemoteHook:
            properties:
                createdAt:
                    example: "2023-11-15T14:30:45Z"
                    format: date-time
                    type: string
                endpointUrl:
                    example: http://hooks-endpoint:port
                    type: string
                headers:
                    additionalProperties: true
                    type: object
                id:
                    example: h1a2b3c4-d5e6-f7g8-h9i0-j1k2l3m4n5o6
                    type: string
                injectParams:
                    additionalProperties: true
                    description: injected as tool call args, hidden from model schema
                    type: object
                name:
                    example: mailing-tools
                    type: string
                properties:
                    $ref: '#/components/schemas/runtimetypes_InjectionArg'
                timeoutMs:
                    example: 5000
                    type: integer
                updatedAt:
                    example: "2023-11-15T14:30:45Z"
                    format: date-time
                    type: string
            required:
                - id
                - name
                - endpointUrl
                - timeoutMs
                - properties
                - createdAt
                - updatedAt
            type: object
        setupapi_putCLIConfigRequest:
            properties:
                default-chain:
                    type: string
                default-model:
                    type: string
                default-provider:
                    type: string
            required:
                - default-model
                - default-provider
                - default-chain
            type: object
        setupapi_putCLIConfigResponse:
            properties:
                defaultChain:
                    type: string
                defaultModel:
                    type: string
                defaultProvider:
                    type: string
            required:
                - defaultModel
                - defaultProvider
                - defaultChain
            type: object
        setupcheck_BackendCheck:
            properties:
                baseUrl:
                    type: string
                chatModelCount:
                    type: integer
                chatModels:
                    items:
                        type: string
                    type: array
                defaultProvider:
                    type: boolean
                error:
                    type: string
                hint:
                    type: string
                id:
                    type: string
                modelCount:
                    type: integer
                name:
                    type: string
                reachable:
                    type: boolean
                status:
                    type: string
                type:
                    type: string
            required:
                - id
                - name
                - type
                - baseUrl
                - status
                - reachable
                - defaultProvider
                - modelCount
                - chatModelCount
            type: object
        setupcheck_Issue:
            properties:
                category:
                    type: string
                cliCommand:
                    type: string
                code:
                    type: string
                fixPath:
                    type: string
                message:
                    type: string
                severity:
                    type: string
            required:
                - code
                - severity
                - message
            type: object
        setupcheck_Result:
            properties:
                backendChecks:
                    items:
                        $ref: '#/components/schemas/setupcheck_BackendCheck'
                    type: array
                backendCount:
                    type: integer
                defaultChain:
                    type: string
                defaultModel:
                    type: string
                defaultProvider:
                    type: string
                issues:
                    items:
                        $ref: '#/components/schemas/setupcheck_Issue'
                    type: array
                reachableBackendCount:
                    type: integer
            required:
                - defaultModel
                - defaultProvider
                - defaultChain
                - backendCount
                - reachableBackendCount
                - issues
            type: object
        statetype_BackendRuntimeState:
            properties:
                backend:
                    $ref: '#/components/schemas/runtimetypes_Backend'
                error:
                    description: |-
                        Error stores a description of the last encountered error when
                        interacting with or reconciling this backend's state, if any.
                    example: 'connection timeout: context deadline exceeded'
                    type: string
                id:
                    example: b7d9e1a3-8f0c-4a7d-9b1e-2f3a4b5c6d7e
                    type: string
                models:
                    items:
                        type: string
                    type: array
                name:
                    example: ollama-production
                    type: string
                pulledModels:
                    $ref: '#/components/schemas/statetype_ModelPullStatus'
            required:
                - id
                - name
                - models
                - pulledModels
                - backend
            type: object
        statetype_ModelDetails:
            properties:
                families:
                    items:
                        type: string
                    type: array
                family:
                    example: Mistral
                    type: string
                format:
                    example: gguf
                    type: string
                parameterSize:
                    example: 7B
                    type: string
                parentModel:
                    example: mistral:7b
                    type: string
                quantizationLevel:
                    example: Q4_K_M
                    type: string
            required:
                - parentModel
                - format
                - family
                - families
                - parameterSize
                - quantizationLevel
            type: object
        statetype_ModelPullStatus:
            properties:
                canChat:
                    example: true
                    type: boolean
                canEmbed:
                    example: false
                    type: boolean
                canPrompt:
                    example: true
                    type: boolean
                canStream:
                    example: true
                    type: boolean
                contextLength:
                    example: 4096
                    type: integer
                details:
                    $ref: '#/components/schemas/statetype_ModelDetails'
                digest:
                    example: sha256:9e3a6c0d3b5e7f8a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a
                    type: string
                model:
                    example: mistral:instruct
                    type: string
                modifiedAt:
                    example: "2023-11-15T14:30:45Z"
                    format: date-time
                    type: string
                name:
                    example: Mistral 7B Instruct
                    type: string
                size:
                    example: 4709611008
                    type: integer
            required:
                - name
                - model
                - modifiedAt
                - size
                - digest
                - details
                - contextLength
                - canChat
                - canEmbed
                - canPrompt
                - canStream
            type: object
        taskengine_BranchCompose:
            properties:
                strategy:
                    description: |-
                        Strategy defines how values should be merged ("override", "merge_chat_histories", "append_string_to_chat_history").
                        Optional; defaults to "override" or "merge_chat_histories" if both output and WithVar values are ChatHistory.
                        "merge_chat_histories": If both output and WithVar values are ChatHistory,
                        appends the WithVar's Messages to the output's Messages.
                    type: string
                with_var:
                    description: Selects the variable to compose the current input with.
                    type: string
            type: object
        taskengine_CapturedStateUnit:
            properties:
                duration:
                    description: in nanoseconds
                    example: 452000000
                    format: nanoseconds
                    type: integer
                error:
                    $ref: '#/components/schemas/taskengine_ErrorResponse'
                input:
                    example: This is a test input that needs validation
                    type: string
                inputType:
                    example: string
                    type: string
                inputVar:
                    description: Which variable was used as input
                    example: input
                    type: string
                output:
                    example: valid
                    type: string
                outputType:
                    example: string
                    type: string
                taskHandler:
                    example: condition_key
                    type: string
                taskID:
                    example: validate_input
                    type: string
                transition:
                    example: valid_input
                    type: string
            required:
                - taskID
                - taskHandler
                - inputType
                - outputType
                - transition
                - duration
                - error
                - input
                - output
                - inputVar
            type: object
        taskengine_ErrorResponse:
            properties:
                error:
                    example: 'validation failed: input contains prohibited content'
                    type: string
            required:
                - error
            type: object
        taskengine_FunctionCall:
            properties:
                arguments:
                    example: '{\n  \"location\": \"San Francisco, CA\",\n  \"unit\": \"celsius\"\n}'
                    type: string
                name:
                    example: get_current_weather
                    type: string
            required:
                - name
                - arguments
            type: object
        taskengine_FunctionTool:
            properties:
                description:
                    type: string
                name:
                    type: string
                parameters:
                    description: JSON Schema object
            required:
                - name
            type: object
        taskengine_HookCall:
            properties:
                args:
                    additionalProperties: true
                    description: |-
                        Args are key-value pairs to parameterize the hook call.
                        Example: {"to": "user@example.com", "subject": "Notification"}
                    type: object
                name:
                    description: Name is the registered hook-service (e.g., "send_email").
                    example: slack
                    type: string
                tool_name:
                    description: ToolName is the name of the tool to invoke (e.g., "send_slack_notification").
                    example: send_slack_notification
                    type: string
            required:
                - name
                - tool_name
                - args
            type: object
        taskengine_LLMExecutionConfig:
            properties:
                hide_tools:
                    items:
                        type: string
                    type: array
                hook_policies:
                    additionalProperties: true
                    description: |-
                        HookPolicies carries per-hook policy overrides for this task.
                        Keys are hook names; values are maps of policy key → value pairs.
                        These are injected into the context before GetToolsForHookByName is called,
                        so hooks can produce dynamic tool descriptions and enforce the policy at Exec time.
                        Example (local_shell):
                        hook_policies:
                        local_shell:
                        _allowed_commands: "git,go,ls,cat,grep"
                        _denied_commands:  "sudo,su,dd,mkfs"
                    type: object
                hooks:
                    description: |-
                        Hooks is the allowlist of hook names this task may invoke.
                        Patterns supported:
                        - absent/null   — all registered hooks (backward-compatible default)
                        - []            — no hooks exposed to the model
                        - ["*"]         — all registered hooks (explicit)
                        - ["a","b"]     — only the named hooks (unknown names silently ignored)
                        - ["*","!name"] — all hooks except the excluded name(s)
                        Exclusions ("!name") are only meaningful when combined with "*".
                    items:
                        type: string
                    type: array
                model:
                    example: mistral:instruct
                    type: string
                models:
                    items:
                        type: string
                    type: array
                pass_clients_tools:
                    type: boolean
                provider:
                    example: ollama
                    type: string
                providers:
                    items:
                        type: string
                    type: array
                shift:
                    description: Shift allows the context window to slide on overflow instead of erroring.
                    type: boolean
                temperature:
                    example: 0.7
                    type: number
                think:
                    description: |-
                        Think enables reasoning mode for supported models.
                        Accepts "true"/"false" or "high"/"medium"/"low". Empty = provider default (off).
                    example: high
                    type: string
            required:
                - model
                - pass_clients_tools
            type: object
        taskengine_OpenAIChatRequest:
            properties:
                frequency_penalty:
                    example: 0
                    type: number
                max_tokens:
                    example: 512
                    type: integer
                messages:
                    $ref: '#/components/schemas/taskengine_OpenAIChatRequestMessage'
                model:
                    example: mistral:instruct
                    type: string
                "n":
                    example: 1
                    type: integer
                presence_penalty:
                    example: 0
                    type: number
                stop:
                    items:
                        type: string
                    type: array
                stream:
                    example: false
                    type: boolean
                temperature:
                    example: 0.7
                    type: number
                tool_choice:
                    description: 'Can be "none", "auto", or {"type": "function", "function": {"name": "my_function"}}'
                tools:
                    items:
                        $ref: '#/components/schemas/taskengine_Tool'
                    type: array
                top_p:
                    example: 1
                    type: number
                user:
                    example: user_123
                    type: string
            required:
                - model
                - messages
            type: object
        taskengine_OpenAIChatRequestMessage:
            properties:
                content:
                    example: Hello, how are you?
                    type: string
                role:
                    example: user
                    type: string
                thinking:
                    description: Thinking allows clients to supply their own reasoning traces for assistant messages.
                    example: The user is asking a greeting.
                    type: string
                tool_call_id:
                    description: ToolCallID links a tool-result message back to its originating call.
                    type: string
                tool_calls:
                    $ref: '#/components/schemas/taskengine_ToolCall'
            required:
                - role
            type: object
        taskengine_OpenAIChatResponseChoice:
            properties:
                finish_reason:
                    example: stop
                    type: string
                index:
                    example: 0
                    type: integer
                message:
                    $ref: '#/components/schemas/taskengine_OpenAIChatResponseMessage'
            required:
                - index
                - message
                - finish_reason
            type: object
        taskengine_OpenAIChatResponseMessage:
            properties:
                content:
                    example: I can help with that.
                    type: string
                role:
                    example: assistant
                    type: string
                thinking:
                    example: The user asked for help. I should respond positively.
                    type: string
                tool_calls:
                    $ref: '#/components/schemas/taskengine_ToolCall'
            required:
                - role
            type: object
        taskengine_OpenAITokenUsage:
            properties:
                completion_tokens:
                    example: 50
                    type: integer
                prompt_tokens:
                    example: 100
                    type: integer
                total_tokens:
                    example: 150
                    type: integer
            required:
                - prompt_tokens
                - completion_tokens
                - total_tokens
            type: object
        taskengine_TaskChainDefinition:
            properties:
                debug:
                    description: Enables capturing user input and output.
                    type: boolean
                description:
                    description: Description provides a human-readable summary of the chain's purpose.
                    type: string
                id:
                    description: ID uniquely identifies the chain.
                    type: string
                tasks:
                    $ref: '#/components/schemas/taskengine_TaskDefinition'
                token_limit:
                    description: TokenLimit is the token limit for the context window (used during execution).
                    type: integer
            required:
                - id
                - debug
                - description
                - tasks
                - token_limit
            type: object
        taskengine_TaskDefinition:
            properties:
                description:
                    description: Description is a human-readable summary of what the task does.
                    example: Validates user input meets quality requirements
                    type: string
                execute_config:
                    $ref: '#/components/schemas/taskengine_LLMExecutionConfig'
                handler:
                    description: Handler determines how the LLM output (or hook) will be interpreted.
                    example: condition_key
                    type: string
                hook:
                    $ref: '#/components/schemas/taskengine_HookCall'
                id:
                    description: ID uniquely identifies the task within the chain.
                    example: validate_input
                    type: string
                input_var:
                    description: |-
                        InputVar is the name of the variable to use as input for the task.
                        Example: "input" for the original input.
                        Each task stores its output in a variable named with it's task id.
                    example: input
                    type: string
                output_template:
                    description: |-
                        OutputTemplate is an optional go template to format the output of a hook.
                        If specified, the hook's JSON output will be used as data for the template.
                        The final output of the task will be the rendered string.
                        Example: "The weather is {{.weather}} with a temperature of {{.temperature}}."
                    example: 'Hook result: {{.status}}'
                    type: string
                print:
                    description: |-
                        Print optionally formats the output for display/logging.
                        Supports template variables from previous task outputs.
                        Optional for all task types except Hook where it's rarely used.
                        Example: "The score is: {{.previous_output}}"
                    example: 'Validation result: {{.validate_input}}'
                    type: string
                prompt_template:
                    description: |-
                        PromptTemplate is the text prompt sent to the LLM.
                        It's Required and only applicable for the prompt_to_string type.
                        Supports template variables from previous task outputs.
                        Example: "Rate the quality from 1-10: {{.input}}"
                    example: Is this input valid? {{.input}}
                    type: string
                retry_on_failure:
                    description: |-
                        RetryOnFailure sets how many times to retry this task on failure.
                        Applies to all task types including Hooks.
                        Default: 0 (no retries)
                    example: 2
                    type: integer
                system_instruction:
                    description: SystemInstruction provides additional instructions to the LLM, if applicable system level will be used.
                    example: You are a quality control assistant. Respond only with 'valid' or 'invalid'.
                    type: string
                timeout:
                    description: |-
                        Timeout optionally sets a timeout for task execution.
                        Format: "10s", "2m", "1h" etc.
                        Optional for all task types.
                    example: 30s
                    type: string
                transition:
                    $ref: '#/components/schemas/taskengine_TaskTransition'
                valid_conditions:
                    additionalProperties: true
                    description: |-
                        ValidConditions defines allowed values for ConditionKey tasks.
                        Required for ConditionKey tasks, ignored for all other types.
                        Example: {"yes": true, "no": true} for a yes/no condition.
                    type: object
            required:
                - id
                - description
                - handler
                - prompt_template
                - transition
            type: object
        taskengine_TaskTransition:
            properties:
                branches:
                    $ref: '#/components/schemas/taskengine_TransitionBranch'
                on_failure:
                    description: OnFailure is the task ID to jump to in case of failure.
                    example: error_handler
                    type: string
            required:
                - on_failure
                - branches
            type: object
        taskengine_Tool:
            properties:
                function:
                    $ref: '#/components/schemas/taskengine_FunctionTool'
                type:
                    type: string
            required:
                - type
                - function
            type: object
        taskengine_ToolCall:
            properties:
                function:
                    $ref: '#/components/schemas/taskengine_FunctionCall'
                id:
                    example: call_abc123
                    type: string
                provider_meta:
                    additionalProperties: true
                    description: |-
                        ProviderMeta carries opaque provider-specific data (e.g. Gemini thought_signature)
                        that must be round-tripped back on the next turn.
                    type: object
                type:
                    example: function
                    type: string
            required:
                - id
                - type
                - function
            type: object
        taskengine_TransitionBranch:
            properties:
                compose:
                    $ref: '#/components/schemas/taskengine_BranchCompose'
                goto:
                    description: |-
                        Goto specifies the target task ID if this branch is taken.
                        Leave empty or use taskengine.TermEnd to end the chain.
                    example: positive_response
                    type: string
                operator:
                    description: Operator defines how to compare the task's output to When.
                    example: equals
                    type: string
                when:
                    description: |-
                        When specifies the condition that must be met to follow this branch.
                        Format depends on the task type:
                        - For condition_key: exact string match
                        - For prompt_to_int: numeric comparison (using Operator)
                    example: "yes"
                    type: string
            required:
                - when
                - goto
            type: object
        terminalapi_createSessionRequest:
            properties:
                cols:
                    type: integer
                cwd:
                    type: string
                rows:
                    type: integer
                shell:
                    type: string
            required:
                - cwd
                - cols
                - rows
            type: object
        terminalapi_createSessionResponse:
            properties:
                id:
                    type: string
                wsPath:
                    type: string
            required:
                - id
                - wsPath
            type: object
        terminalapi_patchSessionRequest:
            properties:
                cols:
                    type: integer
                rows:
                    type: integer
            required:
                - cols
                - rows
            type: object
        terminalstore_Session:
            properties:
                cols:
                    type: integer
                createdAt:
                    format: date-time
                    type: string
                cwd:
                    type: string
                id:
                    type: string
                nodeInstanceId:
                    type: string
                principal:
                    type: string
                rows:
                    type: integer
                shell:
                    type: string
                status:
                    $ref: '#/components/schemas/terminalstore_SessionStatus'
                updatedAt:
                    format: date-time
                    type: string
                workspaceId:
                    type: string
            required:
                - id
                - principal
                - cwd
                - shell
                - cols
                - rows
                - status
                - nodeInstanceId
                - createdAt
                - updatedAt
            type: object
        terminalstore_SessionStatus:
            type: string
        usersapi_LoginRequest:
            properties:
                email:
                    example: user@example.com
                    type: string
                password:
                    example: s3cr3t!
                    type: string
            required:
                - email
                - password
            type: object
        usersapi_LoginResponse:
            properties:
                expires_at:
                    format: date-time
                    type: string
                user_id:
                    type: string
                username:
                    type: string
            required:
                - expires_at
                - user_id
                - username
            type: object
        usersapi_tokenRefreshRequest:
            properties:
                token:
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    type: string
            required:
                - token
            type: object
        usersapi_tokenRefreshResponse:
            properties:
                token:
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    type: string
            required:
                - token
            type: object
        vfsapi_FileResponse:
            properties:
                contentType:
                    example: application/pdf
                    type: string
                createdAt:
                    example: "2024-06-01T12:00:00Z"
                    format: date-time
                    type: string
                id:
                    example: file_abc123
                    type: string
                isDirectory:
                    example: false
                    type: boolean
                name:
                    example: report.pdf
                    type: string
                path:
                    example: /documents/report.pdf
                    type: string
                size:
                    example: 102400
                    type: integer
                updatedAt:
                    example: "2024-06-01T12:00:00Z"
                    format: date-time
                    type: string
            required:
                - id
                - path
                - name
                - size
                - createdAt
                - updatedAt
            type: object
        vfsapi_FolderResponse:
            properties:
                createdAt:
                    example: "2024-06-01T12:00:00Z"
                    format: date-time
                    type: string
                id:
                    example: folder_xyz789
                    type: string
                name:
                    example: projects
                    type: string
                parentId:
                    example: folder_root
                    type: string
                path:
                    example: /documents/projects
                    type: string
                updatedAt:
                    example: "2024-06-01T12:00:00Z"
                    format: date-time
                    type: string
            required:
                - id
                - path
                - name
                - createdAt
                - updatedAt
            type: object
        vfsapi_folderCreateRequest:
            properties:
                name:
                    example: New Folder
                    type: string
                parentId:
                    example: folder_root
                    type: string
                path:
                    example: New Folder
                    type: string
            required:
                - name
            type: object
        vfsapi_moveRequest:
            properties:
                newParentId:
                    example: folder_abc123
                    type: string
            required:
                - newParentId
            type: object
        vfsapi_nameUpdateRequest:
            properties:
                name:
                    example: new-name.txt
                    type: string
                path:
                    example: new-name.txt
                    type: string
            required:
                - name
            type: object
    securitySchemes:
        X-API-Key:
            in: header
            name: X-API-Key
            type: apiKey
info:
    title: contenox – LLM Backend Management API
    version: v0.6.9
openapi: 3.1.0
paths:
    /backend-affinity/{backendID}/groups:
        get:
            description: |-
                Lists all affinity groups that a specific backend belongs to.
                Useful for understanding which model sets a backend has access to.
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/array_runtimetypes_AffinityGroup'
                    description: OK
                default:
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Default error response
            summary: Lists all affinity groups that a specific backend belongs to.
        parameters:
            - description: The unique identifier of the backend.
              in: path
              name: backendID
              required: true
              schema:
                type: string
    /backend-affinity/{groupID}/backends:
        get:
            description: |-
                Lists all backends associated with a specific affinity group.
                Returns basic backend information without runtime state.
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/array_runtimetypes_Backend'
                    description: OK
                default:
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Default error response
            summary: Lists all backends associated with a specific affinity group.
        parameters:
            - description: The unique identifier of the affinity group.
              in: path
              name: groupID
              required: true
              schema:
                type: string
    /backend-affinity/{groupID}/backends/{backendID}:
        delete:
            description: |-
                Removes a backend from an affinity group.
                After removal, the backend will no longer be eligible to process requests for models in this affinity group.
                Requests requiring models from this affinity group will no longer be routed to this backend.
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                type: string
                    description: OK
                default:
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Default error response
            summary: Removes a backend from an affinity group.
        parameters:
            - description: The unique identifier of the affinity group.
              in: path
              name: groupID
              required: true
              schema:
                type: string
            - description: The unique identifier of the backend to be assigned.
              in: path
              name: backendID
              required: true
              schema:
                type: string
        post:
            description: |-
                Associates a backend with an affinity group.
                After assignment, the backend can process requests for all models in the affinity group.
                This enables request routing between the backend and models that share this affinity group.
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                type: string
                    description: Created
                default:
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Default error response
            summary: Associates a backend with an affinity group.
    /backends:
        get:
            description: |-
                Lists all configured backend connections with runtime status.
                NOTE: Only backends assigned to at least one group will be used for request processing.
                Backends not assigned to any group exist in the configuration but are completely ignored by the routing system.
            parameters:
                - description: An optional RFC3339Nano timestamp to fetch the next page of results.
                  in: query
                  name: cursor
                  schema:
                    type: string
                - description: The maximum number of items to return per page.
                  in: query
                  name: limit
                  schema:
                    default: "100"
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/array_backendapi_backendSummary'
                    description: OK
                default:
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Default error response
            summary: Lists all configured backend connections with runtime status.
        post:
            description: |-
                Creates a new backend connection to an LLM provider.
                Backends represent connections to LLM services (e.g., Ollama, OpenAI) that can host models.
                Note: Creating a backend will be provisioned on the next synchronization cycle.
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/runtimetypes_Backend'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/runtimetypes_Backend'
                    description: Created
                default:
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Default error response
            summary: Creates a new backend connection to an LLM provider.
    /backends/{id}:
        delete:
            description: |-
                Removes a backend connection.
                This does not deleteBackend models from the remote provider, only removes the connection.
                Returns a simple "backend removed" confirmation message on success.
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                type: string
                    description: OK
                default:
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Default error response
            summary: Removes a backend connection.
        get:
            description: Retrieves complete information for a specific backend
            responses:
                "200":
                    content:
