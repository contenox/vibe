                    description: OK
                default:
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Default error response
            summary: Lists all runtime-observed models in OpenAI-compatible format.
        parameters:
            - description: The ID of the chain that links to the openAI completion API. Currently unused.
              in: path
              name: chainID
              required: true
              schema:
                type: string
    /openai/v1/models:
