<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contenox Runtime API</title>
    <script type="module" src="https://unpkg.com/rapidoc/dist/rapidoc-min.js"></script>
    <style>
      body { margin: 0; }
      rapi-doc { width: 100%; height: 100vh; display: block; }
    </style>
  </head>
  <body>
    <rapi-doc
      spec-url="/openapi.json"
      render-style="read"
      theme="dark"
      show-header="false"
      allow-try="false"
      schema-style="tree"
    ></rapi-doc>
  </body>
</html>
