#:schema https://json.schemastore.org/any.json
# Air — live reload for Go: https://github.com/air-verse/air
# Run: make dev-go-watch  (after: make deps-go-watch)
# Pair with Vite: make dev-web-proxy

root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -ldflags \"-X github.com/contenox/contenox/runtime/contenoxcli.Version=dev\" -o ./bin/contenox ./cmd/contenox"
entrypoint = ["./bin/contenox", "beam"]
include_ext = ["go", "tpl", "tmpl", "html", "js", "css", "svg", "json"]
exclude_dir = [
  "node_modules",
  "packages/beam/node_modules",
  "packages/ui/node_modules",
  ".git",
  "tmp",
  "enterprise",
  "apitests",
  "docs",
  "website",
  "testproject",
]
exclude_regex = ["_test\\.go"]
delay = 500
stop_on_error = true
send_interrupt = true
kill_delay = "500ms"

[log]
time = true

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = false
