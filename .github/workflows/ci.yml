# Cheap CI: compile smoke + TestUnit_* only (-short). No TestSystem_* / Docker / LLM integration tests.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Prepare embed inputs (Beam UI + OpenAPI stub)
        run: make ci-prepare-embeds

      - name: Generate OpenAPI (embedded in binary)
        run: make docs-gen

      - name: Build contenox (compile smoke)
        run: make build-cli

      - name: Cheap Go tests (TestUnit_* + -short only)
        run: make test-unit
