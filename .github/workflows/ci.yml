# Cheap CI: compile smoke + TestUnit_* only (-short). No TestSystem_* / Docker / LLM integration tests.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install CGo dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc g++ nlohmann-json3-dev

      - name: Fetch missing llama.cpp headers
        run: |
          OLLAMA_MOD="$(go env GOPATH)/pkg/mod/github.com/ollama/ollama@v0.17.5"
          go mod download github.com/ollama/ollama@v0.17.5
          chmod -R u+w "$OLLAMA_MOD/llama"
          MTMD="$OLLAMA_MOD/llama/llama.cpp/tools/mtmd"
          mkdir -p "$MTMD/miniaudio" "$MTMD/stb"
          curl -fsSL https://raw.githubusercontent.com/mackron/miniaudio/master/miniaudio.h \
               -o "$MTMD/miniaudio/miniaudio.h"
          curl -fsSL https://raw.githubusercontent.com/nothings/stb/master/stb_image.h \
               -o "$MTMD/stb/stb_image.h"

      - name: Build contenox (compile smoke)
        run: make build-contenox

      - name: CLI help smoke
        run: make test-contenox-help

      - name: Cheap Go tests (TestUnit_* + -short only)
        run: make test-unit
