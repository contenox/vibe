name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.TAG }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract tag
        id: vars
        run: echo "TAG=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Verify version matches tag
        run: |
          TAG="${{ steps.vars.outputs.TAG }}"
          VERSION_IN_FILE=$(cat runtime/version/version.txt | tr -d '\n' | tr -d '\r')
          if [ "$VERSION_IN_FILE" != "$TAG" ]; then
            echo "ERROR: Version in file ($VERSION_IN_FILE) does NOT match tag ($TAG)"
            echo "This means the tag was created without updating the version file first."
            echo "Proper release process:"
            echo "  1. Update runtime/version/version.txt with new version"
            echo "  2. Commit the change"
            echo "  3. Create tag pointing to THAT commit"
            echo "  4. Push tag"
            exit 1
          fi
          echo "✓ Version verification passed: $VERSION_IN_FILE matches tag"

  build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            cc: gcc
            cxx: g++
          - goarch: arm64
            cc: aarch64-linux-gnu-gcc
            cxx: aarch64-linux-gnu-g++
            cross: true

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install CGo dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc g++ nlohmann-json3-dev
          ${{ matrix.cross && 'sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu' || 'true' }}

      - name: Fetch missing llama.cpp headers
        run: |
          OLLAMA_VERSION="$(go list -m -f '{{.Version}}' github.com/ollama/ollama)"
          OLLAMA_MOD="$(go env GOPATH)/pkg/mod/github.com/ollama/ollama@${OLLAMA_VERSION}"
          go mod download "github.com/ollama/ollama@${OLLAMA_VERSION}"
          chmod -R u+w "$OLLAMA_MOD/llama"
          MTMD="$OLLAMA_MOD/llama/llama.cpp/tools/mtmd"
          mkdir -p "$MTMD/miniaudio" "$MTMD/stb"
          curl -fsSL https://raw.githubusercontent.com/mackron/miniaudio/master/miniaudio.h \
               -o "$MTMD/miniaudio/miniaudio.h"
          curl -fsSL https://raw.githubusercontent.com/nothings/stb/master/stb_image.h \
               -o "$MTMD/stb/stb_image.h"

      - name: Build contenox binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          TAG="${{ needs.verify.outputs.tag }}"
          LDFLAGS="-X github.com/contenox/contenox/runtime/contenoxcli.Version=${TAG}"
          mkdir -p bin
          go build -ldflags="${LDFLAGS}" -o bin/contenox-linux-${{ matrix.goarch }} ./cmd/contenox

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contenox-linux-${{ matrix.goarch }}
          path: bin/contenox-linux-${{ matrix.goarch }}

  release:
    needs: [verify, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release and upload assets
        run: |
          TAG="${{ needs.verify.outputs.tag }}"
          gh release create "$TAG" contenox-* \
            --title "$TAG" \
            --notes "" \
            --latest \
            --verify-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
